<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>poly-fight launcher</title>
<style>
  :root{
    --bg:#f4efe7; --card:#fffdf9; --ink:#221c15; --ink2:#6b6155; --ink3:#9c9285;
    --line:rgba(58,46,32,.12); --coral:#ff6b4a; --coral-d:#e8502f; --teal:#1d9e75;
    --inset:#efe9dd; --r:14px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font:15px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
       color:var(--ink); background:var(--bg);
       background-image:radial-gradient(80% 80% at 0% 0%,rgba(255,107,74,.10),transparent 50%),
                        radial-gradient(80% 80% at 100% 100%,rgba(29,158,117,.08),transparent 55%);
       min-height:100vh; padding:28px 16px;}
  .wrap{max-width:560px; margin:0 auto;}
  h1{font-size:20px; font-weight:600; margin:0 0 2px; letter-spacing:-.01em;}
  .sub{color:var(--ink3); font-size:13px; margin:0 0 18px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
        padding:18px 18px 20px; box-shadow:0 6px 24px rgba(74,56,36,.07);}
  .seg{display:flex; gap:6px; background:var(--inset); padding:4px; border-radius:11px; margin-bottom:18px;}
  .seg button{flex:1; border:0; background:transparent; padding:9px; border-radius:8px; font:inherit;
              font-weight:600; color:var(--ink2); cursor:pointer;}
  .seg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 4px rgba(74,56,36,.12);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:11px 14px;}
  .grid .full{grid-column:1 / -1;}
  label{display:block; font-size:12px; font-weight:600; color:var(--ink2); margin:0 0 4px;}
  input{width:100%; height:38px; padding:0 11px; border:1px solid var(--line); border-radius:9px;
        background:var(--card); font:inherit; color:var(--ink); outline:none;}
  input:focus{border-color:var(--coral); box-shadow:0 0 0 3px rgba(255,107,74,.16);}
  .hint{font-size:11px; color:var(--ink3); margin-top:3px;}
  .row{display:flex; gap:10px; margin-top:18px;}
  .btn{flex:1; height:44px; border:0; border-radius:11px; font:inherit; font-weight:700; cursor:pointer;}
  .btn.go{background:var(--coral); color:#fff;} .btn.go:hover{background:var(--coral-d);}
  .btn.go:disabled{opacity:.5; cursor:default;}
  .btn.ghost{flex:none; padding:0 16px; background:var(--inset); color:var(--ink2);}
  .sec{margin:16px 0 6px; font-size:12px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em;}
  .log{margin-top:16px; background:#1c1813; color:#d8cfc0; border-radius:11px; padding:12px 14px;
       font:12px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace; max-height:280px; overflow:auto; white-space:pre-wrap; display:none;}
  .log.show{display:block;}
  .log .ok{color:#5bd99a;} .log .err{color:#ff8a7a;} .log .dim{color:#8a8175;}
  .result{margin-top:14px; padding:13px 15px; border-radius:11px; display:none; font-weight:600;}
  .result.ok{display:block; background:rgba(29,158,117,.12); color:#0f6e56;}
  .result.fail{display:block; background:rgba(229,72,77,.12); color:#a3292c;}
  .result a{color:inherit; font-weight:700;}
  .saved{font-size:12px; color:var(--teal); margin-left:8px; opacity:0; transition:opacity .2s;}
  .saved.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <h1>poly-fight launcher</h1>
  <p class="sub">本地验证 / 一键部署到 VPS · 敏感信息只存本地 <code>secret/launcher.json</code></p>
  <div class="card">
    <div class="seg">
      <button id="m-local" class="on" onclick="setMode('local')">本地</button>
      <button id="m-remote" onclick="setMode('remote')">远程 VPS</button>
    </div>

    <div class="sec">登录 + 链上 <span id="saved" class="saved">已保存 ✓</span></div>
    <div class="grid">
      <div><label>面板用户名</label><input id="dashboard.username"></div>
      <div><label>面板密码</label><input id="dashboard.password" type="password"></div>
      <div class="full"><label>Alchemy HTTPS</label><input id="rpc.https"></div>
      <div class="full"><label>Alchemy WSS</label><input id="rpc.wss"></div>
    </div>

    <div id="local-fields">
      <div class="sec">本地</div>
      <div class="grid">
        <div><label>Host</label><input id="local.host"></div>
        <div><label>端口</label><input id="local.port"></div>
        <div class="full"><label>数据目录</label><input id="local.data_dir"></div>
      </div>
    </div>

    <div id="remote-fields" style="display:none">
      <div class="sec">VPS</div>
      <div class="grid">
        <div><label>VPS 地址</label><input id="remote.vps_host" placeholder="ip 或 host"></div>
        <div><label>用户</label><input id="remote.vps_user"></div>
        <div class="full"><label>SSH 私钥路径</label><input id="remote.ssh_key" placeholder="~/.ssh/id_ed25519"></div>
        <div><label>VPS 端口</label><input id="remote.port"></div>
        <div><label>仓库目录</label><input id="remote.repo_dir"></div>
        <div class="full"><label>域名 (Caddy)</label><input id="remote.domain"></div>
      </div>
    </div>

    <div class="row">
      <button class="btn ghost" onclick="save()">保存配置</button>
      <button id="go" class="btn go" onclick="start()">启动</button>
      <button class="btn ghost" onclick="stop()">停止</button>
    </div>

    <div id="result" class="result"></div>
    <pre id="log" class="log"></pre>
  </div>
</div>
<script>
let MODE = "local";
const $ = id => document.getElementById(id);
const FIELDS = ["dashboard.username","dashboard.password","rpc.https","rpc.wss",
  "local.host","local.port","local.data_dir",
  "remote.vps_host","remote.vps_user","remote.ssh_key","remote.port","remote.repo_dir","remote.domain"];
const SECRET = new Set(["dashboard.password","rpc.https","rpc.wss"]);
const DEFAULTS = {
  "dashboard.username":"admin",
  "local.host":"127.0.0.1", "local.port":"8787", "local.data_dir":"data",
  "remote.vps_user":"root", "remote.ssh_key":"~/.ssh/id_ed25519", "remote.port":"8787",
  "remote.repo_dir":"/opt/poly-fight", "remote.domain":"dashboard.polylwl1203.top"
};

function setMode(m){
  MODE = m;
  $("m-local").classList.toggle("on", m==="local");
  $("m-remote").classList.toggle("on", m==="remote");
  $("local-fields").style.display = m==="local" ? "" : "none";
  $("remote-fields").style.display = m==="remote" ? "" : "none";
}
function get(path){ const [a,b]=path.split("."); return (window.CFG[a]||{})[b]; }
async function load(){
  window.CFG = await (await fetch("/api/config")).json();
  for(const f of FIELDS){
    const el=$(f); if(!el) continue;
    const v=get(f);
    if(SECRET.has(f)){               // 密钥不回显:留空=保持不变,有值=已设置
      el.value=""; el.placeholder = (v==="••••") ? "已设置 · 留空不改" : "未设置";
    }else{
      el.value = (v==null||v==="") ? (DEFAULTS[f]||"") : v;
    }
  }
}
function collect(){
  const out={};
  for(const f of FIELDS){
    const [a,b]=f.split("."); const val=$(f).value;
    if(SECRET.has(f) && val==="") continue;   // 密钥留空 → 不提交 → 后端保持原值
    (out[a]=out[a]||{})[b]=val;
  }
  return out;
}
async function save(){
  await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(collect())});
  $("saved").classList.add("show"); setTimeout(()=>$("saved").classList.remove("show"),1500);
  await load();
}
function logline(t){
  const el=$("log"); el.classList.add("show");
  const span=document.createElement("span");
  if(t.startsWith("RESULT_OK")||/\bOK\b/.test(t)) span.className="ok";
  else if(/ABORT|ERROR|RESULT_FAIL|exit [1-9]/.test(t)) span.className="err";
  else if(t.startsWith("$")||t.startsWith("[")) span.className="dim";
  span.textContent=t+"\n"; el.appendChild(span); el.scrollTop=el.scrollHeight;
}
function showResult(ok,msg,url){
  const r=$("result"); r.className="result "+(ok?"ok":"fail");
  r.innerHTML = ok ? `✓ 已启动 · <a href="${url}" target="_blank">${url}</a>` : `✗ ${msg||"启动失败，见日志"}`;
}
function run(path){
  $("go").disabled=true; $("log").textContent=""; $("result").className="result";
  const es=new EventSource(path);
  es.onmessage=e=>{
    const t=e.data;
    if(t==="__DONE__"){ es.close(); $("go").disabled=false; return; }
    logline(t);
    if(t.startsWith("RESULT_OK")) showResult(true,"",t.slice(9).trim());
    if(t.startsWith("RESULT_FAIL")) showResult(false,t.slice(11).trim());
  };
  es.onerror=()=>{ es.close(); $("go").disabled=false; };
}
async function start(){ await save(); run("/api/start?mode="+MODE); }
function stop(){ run("/api/stop?mode="+MODE); }
load();
</script>
</body>
</html>

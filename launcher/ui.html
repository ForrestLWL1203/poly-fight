<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>poly-fight launcher</title>
<style>
  :root{
    --bg:#f4efe7; --card:#fffdf9; --ink:#221c15; --ink2:#6b6155; --ink3:#9c9285;
    --line:rgba(58,46,32,.12); --coral:#ff6b4a; --coral-d:#e8502f; --teal:#1d9e75;
    --inset:#efe9dd; --r:14px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font:14.5px/1.55 -apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
       color:var(--ink); background:var(--bg);
       background-image:radial-gradient(70% 70% at 0% 0%,rgba(255,107,74,.10),transparent 50%),
                        radial-gradient(70% 70% at 100% 100%,rgba(29,158,117,.08),transparent 55%);
       min-height:100vh; padding:24px 18px;}
  .wrap{max-width:1000px; margin:0 auto; display:grid; grid-template-columns:minmax(0,440px) minmax(0,1fr); gap:18px; align-items:start;}
  @media(max-width:820px){.wrap{grid-template-columns:1fr;}}
  h1{font-size:19px; font-weight:600; margin:0 0 2px; letter-spacing:-.01em;}
  .sub{color:var(--ink3); font-size:12.5px; margin:0 0 14px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
        padding:16px 16px 18px; box-shadow:0 6px 24px rgba(74,56,36,.07);}
  .seg{display:flex; gap:6px; background:var(--inset); padding:4px; border-radius:11px; margin-bottom:16px;}
  .seg button{flex:1; border:0; background:transparent; padding:8px; border-radius:8px; font:inherit;
              font-weight:600; color:var(--ink2); cursor:pointer;}
  .seg button.on{background:var(--card); color:var(--ink); box-shadow:0 1px 4px rgba(74,56,36,.12);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 13px;}
  .grid .full{grid-column:1 / -1;}
  label{display:block; font-size:11.5px; font-weight:600; color:var(--ink2); margin:0 0 4px;}
  input{width:100%; height:36px; padding:0 10px; border:1px solid var(--line); border-radius:9px;
        background:var(--card); font:inherit; color:var(--ink); outline:none;}
  input:focus{border-color:var(--coral); box-shadow:0 0 0 3px rgba(255,107,74,.16);}
  input::placeholder{color:var(--ink3); font-size:12px;}
  .sec{margin:15px 0 6px; font-size:11.5px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em;}
  .saved{font-size:11.5px; color:var(--teal); margin-left:8px; opacity:0; transition:opacity .2s;}
  .saved.show{opacity:1;}
  .btns{display:flex; flex-wrap:wrap; gap:8px; margin-top:16px;}
  .btn{height:42px; border:0; border-radius:11px; font:inherit; font-weight:700; cursor:pointer; padding:0 16px;}
  .btn.prep{background:var(--inset); color:var(--ink); border:1px solid var(--line);}
  .btn.go{flex:1; background:var(--coral); color:#fff; min-width:90px;} .btn.go:hover{background:var(--coral-d);}
  .btn.stop{background:var(--inset); color:var(--ink2);}
  .btn:disabled{opacity:.5; cursor:default;}
  .btn.ghost{background:transparent; color:var(--ink2); border:1px solid var(--line); height:36px; padding:0 12px; font-weight:600;}
  .logcard{position:sticky; top:24px; display:flex; flex-direction:column; min-height:420px;}
  .loghead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .loghead b{font-size:13px;} .loghead .hint{font-size:11.5px; color:var(--ink3);}
  .result{padding:11px 13px; border-radius:10px; display:none; font-weight:600; font-size:13px; margin-bottom:10px;}
  .result.ok{display:block; background:rgba(29,158,117,.12); color:#0f6e56;}
  .result.fail{display:block; background:rgba(229,72,77,.12); color:#a3292c;}
  .result a{color:inherit; font-weight:700;}
  .log{flex:1; background:#1c1813; color:#d8cfc0; border-radius:11px; padding:12px 14px;
       font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; overflow:auto; white-space:pre-wrap; min-height:300px;}
  .log .ok{color:#5bd99a;} .log .err{color:#ff8a7a;} .log .dim{color:#8a8175;}
  .log .ph{color:#6a6258;}
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <h1>poly-fight launcher</h1>
    <p class="sub">环境准备 → 启动 dashboard · runner 进面板操作 · 密钥只存本地</p>
    <div class="card">
      <div class="seg">
        <button id="m-local" class="on" onclick="setMode('local')">本地</button>
        <button id="m-remote" onclick="setMode('remote')">远程 VPS</button>
      </div>

      <div class="sec">登录 + 链上 <span id="saved" class="saved">已保存 ✓</span></div>
      <div class="grid">
        <div><label>面板用户名</label><input id="dashboard.username"></div>
        <div><label>面板密码</label><input id="dashboard.password" type="password"></div>
        <div class="full"><label>Alchemy HTTPS</label><input id="rpc.https"></div>
        <div class="full"><label>Alchemy WSS</label><input id="rpc.wss"></div>
      </div>

      <div id="local-fields">
        <div class="sec">本地</div>
        <div class="grid">
          <div><label>Host</label><input id="local.host"></div>
          <div><label>端口</label><input id="local.port"></div>
          <div class="full"><label>数据目录</label><input id="local.data_dir"></div>
        </div>
      </div>

      <div id="remote-fields" style="display:none">
        <div class="sec">VPS</div>
        <div class="grid">
          <div><label>VPS 地址</label><input id="remote.vps_host" placeholder="ip 或 host"></div>
          <div><label>用户</label><input id="remote.vps_user"></div>
          <div class="full"><label>SSH 私钥路径</label><input id="remote.ssh_key" placeholder="~/.ssh/id_ed25519"></div>
          <div><label>VPS 端口</label><input id="remote.port"></div>
          <div><label>仓库目录</label><input id="remote.repo_dir"></div>
          <div class="full"><label>域名 (Caddy)</label><input id="remote.domain"></div>
        </div>
      </div>

      <div class="btns">
        <button class="btn ghost" onclick="save()">保存配置</button>
        <button class="btn prep act" onclick="act('prepare')" title="拉代码 + 写密钥 + 装服务 + 反代（不启动）">环境准备</button>
        <button class="btn go act" onclick="act('start')" title="只启动 dashboard">启动</button>
        <button class="btn stop act" onclick="act('stop')" title="停 dashboard（不影响 runner）">停 dashboard</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="card logcard">
      <div class="loghead"><b>运行日志</b><span class="hint" id="mode-hint">本地</span></div>
      <div id="result" class="result"></div>
      <pre id="log" class="log"><span class="ph">点「环境准备 / 启动 / 停 dashboard」这里实时显示日志…</span></pre>
    </div>
  </div>
</div>
<script>
let MODE = "local";
const $ = id => document.getElementById(id);
const FIELDS = ["dashboard.username","dashboard.password","rpc.https","rpc.wss",
  "local.host","local.port","local.data_dir",
  "remote.vps_host","remote.vps_user","remote.ssh_key","remote.port","remote.repo_dir","remote.domain"];
const SECRET = new Set(["dashboard.password","rpc.https","rpc.wss"]);
const DEFAULTS = {
  "dashboard.username":"admin",
  "local.host":"127.0.0.1", "local.port":"8787", "local.data_dir":"data",
  "remote.vps_user":"root", "remote.ssh_key":"~/.ssh/id_ed25519", "remote.port":"8787",
  "remote.repo_dir":"/opt/poly-fight/repo", "remote.domain":"dashboard.polylwl1203.top"
};

function setMode(m){
  MODE = m;
  $("m-local").classList.toggle("on", m==="local");
  $("m-remote").classList.toggle("on", m==="remote");
  $("local-fields").style.display = m==="local" ? "" : "none";
  $("remote-fields").style.display = m==="remote" ? "" : "none";
  $("mode-hint").textContent = m==="local" ? "本地" : "远程 VPS";
}
function get(path){ const [a,b]=path.split("."); return (window.CFG[a]||{})[b]; }
async function load(){
  window.CFG = await (await fetch("/api/config")).json();
  for(const f of FIELDS){
    const el=$(f); if(!el) continue;
    const v=get(f);
    if(SECRET.has(f)){ el.value=""; el.placeholder = (v==="••••") ? "已设置 · 留空不改" : "未设置"; }
    else { el.value = (v==null||v==="") ? (DEFAULTS[f]||"") : v; }
  }
}
function collect(){
  const out={};
  for(const f of FIELDS){
    const [a,b]=f.split("."); const val=$(f).value;
    if(SECRET.has(f) && val==="") continue;
    (out[a]=out[a]||{})[b]=val;
  }
  return out;
}
async function save(){
  await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(collect())});
  $("saved").classList.add("show"); setTimeout(()=>$("saved").classList.remove("show"),1500);
  await load();
}
function logline(t){
  const el=$("log");
  const span=document.createElement("span");
  if(t.startsWith("RESULT_OK")||/\bOK\b|环境就绪|已停/.test(t)) span.className="ok";
  else if(/ABORT|ERROR|RESULT_FAIL|exit [1-9]|fatal/.test(t)) span.className="err";
  else if(t.startsWith("$")||t.startsWith("[")||t.startsWith("SSH")) span.className="dim";
  span.textContent=t+"\n"; el.appendChild(span); el.scrollTop=el.scrollHeight;
}
function showResult(ok,msg,url){
  const r=$("result"); r.className="result "+(ok?"ok":"fail");
  r.innerHTML = ok ? (url&&/^https?:/.test(url) ? `✓ <a href="${url}" target="_blank">${url}</a>` : `✓ ${url||msg||"完成"}`) : `✗ ${msg||"失败，见日志"}`;
}
function run(path){
  document.querySelectorAll(".act").forEach(b=>b.disabled=true);
  $("log").textContent=""; $("result").className="result";
  const es=new EventSource(path);
  es.onmessage=e=>{
    const t=e.data;
    if(t==="__DONE__"){ es.close(); document.querySelectorAll(".act").forEach(b=>b.disabled=false); return; }
    logline(t);
    if(t.startsWith("RESULT_OK")) showResult(true,"",t.slice(9).trim());
    if(t.startsWith("RESULT_FAIL")) showResult(false,t.slice(11).trim());
  };
  es.onerror=()=>{ es.close(); document.querySelectorAll(".act").forEach(b=>b.disabled=false); };
}
async function act(action){ await save(); run("/api/"+action+"?mode="+MODE); }
load();
</script>
</body>
</html>
